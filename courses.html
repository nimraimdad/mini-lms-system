  <style>
    :root {
      --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --dark: #1a1a2e;
      --light: #eeeff8;
      --glass: rgba(255, 255, 255, 0.1);
      --shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    }

    [data-theme="dark"] {
      --light: #0f0f23;
      --glass: rgba(0, 0, 0, 0.2);
    }

    body {
      background: var(--light);
      font-family: 'Inter', sans-serif;
    }

    .navbar {
      background: var(--glass);
      backdrop-filter: blur(10px);
    }

    .hero {
      background: var(--primary);
      color: white;
      padding: 100px 0;
      text-align: center;
    }

    .course-card {
      background: var(--primary);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: all;
      cursor: pointer;
    }

    .course-card:hover {
      transform: translateY(-10px);
      box-shadow: var(--shadow);
    }

    .course-img {
      height: 180px;
      object-fit: cover;
    }

    .enrolled-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #12199c;
      color: white;
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 50px;
    }

    footer {
      background: var(--dark);
      color: #aaa;
      padding: 2rem 0;
      text-align: center;
    }
  </style>
</head>

    const enrolled = JSON.parse(localStorage.getItem('enrolledCourses') || '[]');
    const isLoggedIn = localStorage.getItem('loggedIn') === 'true';
    const container = document.getElementById('coursesContainer');

    courses.forEach((course, i) => {
      const isEnrolled = enrolled.includes(course.slug);
      const col = document.createElement('div');
      col.className = 'col-lg-4 col-md-6';
      col.setAttribute('data-aos', 'fade-up');
      col.setAttribute('data-aos-delay', i * 100);

      col.innerHTML = `
      <div class="card course-card h-100 text-white position-relative" onclick="enroll('${course.slug}')">
        ${isEnrolled ? '<span class="enrolled-badge">Enrolled</span>' : ''}
        <img src="${course.img}" class="card-img-top course-img" alt="${course.title}" loading="lazy">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title fw-bold">${course.title}</h5>
          <p class="card-text flex-grow-1">${course.tagline}</p>
          <div class="d-flex justify-content-between align-items-center mt-auto">
            <span class="h5 mb-0">$${course.price}</span>
            <span class="text-dark fw-bolder">${isEnrolled ? 'Enrolled' : 'Click to Enroll'}</span>
          </div>
        </div>
      </div>
    `;
      container.appendChild(col);
    });


    window.enroll = function (slug) {
      if (!isLoggedIn) {
        alert('Please login first!');
        location.href = 'login.html';
        return;
      }

      if (enrolled.includes(slug)) {
        location.href = `course-detail.html?course=${slug}`;
        return;
      }

      enrolled.push(slug);
      localStorage.setItem('enrolledCourses', JSON.stringify(enrolled));
      alert(`Enrolled in ${courses.find(c => c.slug === slug).title}! Redirecting...`);
      setTimeout(() => {
        location.href = `course-detail.html?course=${slug}`;
      }, 500);
    };
    const authLinks = document.getElementById('authLinks');
    if (isLoggedIn) {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      authLinks.innerHTML = `
      <a href="dashboard.html" class="btn btn-light btn-sm">Dashboard</a>
      <a href="#" id="logout" class="btn btn-light btn-sm">Logout</a>
    `;
      document.getElementById('logout').onclick = () => {
        if (confirm('Logout?')) {
          localStorage.removeItem('loggedIn');
          localStorage.removeItem('user');
          location.href = 'index.html';
        }
      };
    } else {
      authLinks.innerHTML = `
      <a href="login.html" class="btn btn-outline-light btn-sm me-2">Login</a>
      <a href="signup.html" class="btn btn-light text-primary">Sign Up</a>
    `;
    }
