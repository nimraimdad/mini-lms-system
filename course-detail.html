    :root {

      --light: #ffffff;
      --glass: rgba(255, 255, 255, 0.1);
      --shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    }

    [data-theme="dark"] {
      --light: #0f0f23;
      --glass: rgba(0, 0, 0, 0.2);
    }

    body {
      background: #e3e7f8;
      ;
      color: #333;
      font-family: 'Inter', sans-serif;
    }

    .navbar {
      background: var(--glass);
      backdrop-filter: blur(10px);
    }

    .course-header {
      background: var(--primary);
      color: white;
      padding: 120px 0;
    }

    .video-container {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #000;
    }

    .video-locked {
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lock-icon {
      font-size: 5rem;
      opacity: 0.8;
    }

    .btn-enroll {
      background: var(--primary);
      border: none;
      border-radius: 50px;
      margin-left: 170px;
      padding: 12px 30px;
      font-weight: 600;
      transition: all 0.3s;

    }

    .btn-enroll:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(78, 103, 218, 0.4);
    }

    .module-item {
      background: linear-gradient(#cf69dc, #5046e2);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      backdrop-filter: blur(5px);
    }

    .info-card {
      background: var(--primary);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: white;
    }

    .progress-slider {
      accent-color: #4136d5;
      ;

    footer {

      padding: 2rem 0;

    const params = new URLSearchParams(location.search);
    const slug = params.get('course') || 'web-development';
    const course = courses.find(c => c.slug === slug) || courses[0];

    const enrolled = JSON.parse(localStorage.getItem('enrolledCourses') || '[]');
    const isEnrolled = enrolled.includes(slug);
    const isLoggedIn = localStorage.getItem('loggedIn') === 'true';

    // FILL CONTENT
    document.getElementById('title').textContent = course.title;
    document.getElementById('tagline').textContent = course.tagline;
    document.getElementById('about').textContent = course.about;
    document.getElementById('instructor').textContent = course.instructor;
    document.getElementById('duration').textContent = course.duration;
    document.getElementById('level').textContent = course.level;
    document.getElementById('lang').textContent = course.lang;

    const modulesDiv = document.getElementById('modules');
    course.modules.forEach((m, i) => {
      modulesDiv.innerHTML += `<div class="module-item text-white"><strong>Module ${i + 1}:</strong> ${m}</div>`;
    });

    const benefitsDiv = document.getElementById('benefits');
    course.benefits.forEach(b => {
      benefitsDiv.innerHTML += `<li class="mb-2"><span class="text-dark me-2">Check</span> ${b}</li>`;
    });

    const videoSection = document.getElementById('videoSection');
    const enrollBtn = document.getElementById('enrollBtn');
    const progressSection = document.getElementById('progressSection');

    if (isEnrolled && isLoggedIn) {
      videoSection.innerHTML = `<iframe src="${course.video}" allowfullscreen class="w-100" style="height:400px;border-radius:20px;"></iframe>`;
      progressSection.classList.remove('d-none');
      enrollBtn.textContent = 'Enrolled Check';
      enrollBtn.classList.add('btn-success');
      enrollBtn.disabled = true;

      const progressData = JSON.parse(localStorage.getItem('courseProgress') || '{}');
      const currentProgress = progressData[slug] || 0;
      document.getElementById('progressSlider').value = currentProgress;
      document.getElementById('progressValue').textContent = currentProgress + '%';

      document.getElementById('progressSlider').oninput = (e) => {
        document.getElementById('progressValue').textContent = e.target.value + '%';
      };

      document.getElementById('saveProgress').onclick = () => {
        const progress = parseInt(document.getElementById('progressSlider').value);
        progressData[slug] = progress;
        localStorage.setItem('courseProgress', JSON.stringify(progressData));
        alert(`Progress saved: ${progress}% Success`);
      };
    } else {
      videoSection.innerHTML = `
        <div class="video-locked text-white">
          <div class="text-center">
            <div class="lock-icon mb-3">Lock</div>
            <h4>Course Locked</h4>
            <p class="lead">Enroll to unlock videos & materials</p>
          </div>
        </div>`;
      enrollBtn.onclick = () => {
        if (!isLoggedIn) {
          alert('Please login first!');
          location.href = 'login.html';
        } else if (confirm(`Enroll for $${course.price}?`)) {
          enrolled.push(slug);
          localStorage.setItem('enrolledCourses', JSON.stringify(enrolled));
          location.reload();
        }
      };
    }

      authLinks.innerHTML = `
       
        <a href="dashboard.html" class="btn btn-light btn-sm">Dashboard</a>
        <a href="#" id="logout" class="btn btn-light  btn-sm">Logout</a>
      `;
      document.getElementById('logout').onclick = () => {
        if (confirm('Logout?')) {
          localStorage.removeItem('loggedIn'); localStorage.removeItem('user');
          location.href = 'index.html';
        }
      };
    } else {
      authLinks.innerHTML = `
        <a href="login.html" class="btn btn-outline-light btn-sm me-2">Login</a>
        <a href="signup.html" class="btn btn-light text-primary">Sign Up</a>
      `;
    }


    const themeToggle = document.getElementById('themeToggle');
    themeToggle.onclick = () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      themeToggle.textContent = isDark ? 'Dark Mode' : 'Light Mode';
    };
