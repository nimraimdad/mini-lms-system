<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini LMS | Premium Learning</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <style>
    :root {
      --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --dark: #1a1a2e;
      --light: #7484de;
      --glass: rgba(255, 255, 255, 0.1);
      --shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    }

    [data-theme="dark"] {
      --light: #0f0f23;
      --glass: rgba(0, 0, 0, 0.2);
    }

    * {
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--light);
      color: #333;
      transition: all 0.3s;
    }

    .hero {
      min-height: 100vh;
      background: var(--primary);
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20"><path d="M0,10 Q50,0 100,10 L100,20 L0,20 Z" fill="rgba(255,255,255,0.1)"/></svg>') repeat-x;
      animation: wave 20s linear infinite;
    }

    @keyframes wave {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 1000px 0;
      }
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 2rem;
    }

    .theme-toggle {
      cursor: pointer;
      font-size: 1.2rem;
    }

    footer {
      background: var(--dark);
      color: #aaa;
      padding: 2rem 0;
      text-align: center;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg fixed-top py-3"
    style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3 text-white" href="#">Mini LMS</a>
      <div class="ms-auto d-flex align-items-center gap-3">

        <div id="authLinks">
          <a href="login.html" class="btn btn-outline-light btn-sm me-2">Login</a>
          <a href="signup.html" class="btn btn-light text-primary">Sign Up</a>
        </div>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="container text-center text-white position-relative z-10">
      <div class="row justify-content-center">
        <div class="col-lg-8" data-aos="fade-up">
          <h1 class="display-3 fw-bold mb-4">Learn Smarter, <br> Grow Faster</h1>
          <p class="lead mb-5 opacity-90">Premium courses designed for your success. Start your journey today.</p>
          <a href="courses.html" class="btn btn-light btn-lg px-5 py-3 fw-semibold" data-aos="zoom-in"
            data-aos-delay="200">Explore Courses</a>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p class="mb-0">&copy; 2025 Mini LMS | Crafted with </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 1000, once: true });

    const themeToggle = document.getElementById('themeToggle');
    themeToggle.onclick = () => {
      document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      themeToggle.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '' : '';
    };


    const authLinks = document.getElementById('authLinks');
    if (localStorage.getItem('loggedIn') === 'true') {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      authLinks.innerHTML = `
      
        <a href="dashboard.html" class="btn btn-light btn-sm">Dashboard</a>
        <a href="#" id="logout" class="btn btn-danger btn-sm">Logout</a>
      `;
      document.getElementById('logout').onclick = () => {
        if (confirm('Logout?')) {
          localStorage.removeItem('loggedIn'); localStorage.removeItem('user');
          location.reload();
        }
      };
    }



  </script>
</body>

</html>
