<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Mini LMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #9a6fc4 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .signup-card {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, .2);
      width: 420px;
      padding: 40px 30px;
    }

    .signup-card h2 {
      font-weight: 700;
      color: #4136d5;
      margin-bottom: 25px;
      text-align: center;
    }

    .form-control {
      border-radius: 10px;
    }

    .btn-signup {
      background: linear-gradient(90deg, #7e6cf4, #c93ef4);
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 100%;
      padding: 12px;
      font-weight: 600;
      transition: .3s;
    }

    .btn-signup:hover {
      background: linear-gradient(90deg, #5433d9, #d77cfb);
      transform: translateY(-2px);
    }

    .text-link {
      text-align: center;
      margin-top: 15px;
    }

    .text-link a {
      color: #4136d5;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="signup-card">
    <h2>Create Account</h2>
    <form id="signupForm">
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" required placeholder="John Doe">
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required placeholder="you@example.com">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-signup mt-2">Sign Up</button>
    </form>
    <div class="text-link">
      <p>Have account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script>


    document.getElementById('signupForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !password) return alert('All fields required.');

      localStorage.setItem('user', JSON.stringify({ name, email, password }));
      localStorage.setItem('loggedIn', 'true');
      alert('Account created! Welcome ' + name);
      window.location.href = 'dashboard.html';
    });
  </script>
</body>

</html>
