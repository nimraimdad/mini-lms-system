<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Mini LMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #9a6fc4 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, .2);
      width: 400px;
      padding: 40px 30px;
    }

    .login-card h2 {
      font-weight: 700;
      color: #4136d5;
      margin-bottom: 25px;
      text-align: center;
    }

    .form-control {
      border-radius: 10px;
    }

    .btn-login {
      background: linear-gradient(90deg, #7e6cf4, #c93ef4);
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 100%;
      padding: 12px;
      font-weight: 600;
      transition: .3s;
    }

    .btn-login:hover {
      background: linear-gradient(90deg, #7e6cf4, #c93ef4);
      transform: translateY(-2px);
    }

    .text-link {
      text-align: center;
      margin-top: 15px;
    }

    .text-link a {
      color: #4136d5;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <h2>Welcome Back</h2>
    <form id="loginForm">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required placeholder="you@example.com">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-login mt-2">Login</button>
    </form>
    <div class="text-link">
      <p>No account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

  <script>


    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if (user && user.email === email && user.password === password) {
        localStorage.setItem('loggedIn', 'true');
        alert('Login successful!');
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid credentials.');
      }
    });
  </script>
</body>

</html>
